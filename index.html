<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project02 - Task List</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Your CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="app-box shadow-lg p-4 rounded">
                    <h1 class="text-center mb-4">Task List Manager</h1>
                    <p class="text-center text-muted mb-4">
                        Add tasks, remove them, and mark them as completed.
                    </p>

                    <form id="taskForm" class="mb-4">
                        <div class="mb-3">
                            <label for="taskTitle" class="form-label">Task Title</label>
                            <input type="text" class="form-control" id="taskTitle" placeholder="Enter a task" required>
                        </div>

                        <div class="mb-3">
                            <label for="taskPriority" class="form-label">Task Priority</label>
                            <select id="taskPriority" class="form-select" required>
                                <option value="">Choose priority</option>
                                <option value="Low">Low</option>
                                <option value="Medium">Medium</option>
                                <option value="High">High</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label d-block">Task Status</label>

                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="taskStatus" id="pendingStatus" value="Pending" checked>
                                <label class="form-check-label" for="pendingStatus">Pending</label>
                            </div>

                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="taskStatus" id="completedStatus" value="Completed">
                                <label class="form-check-label" for="completedStatus">Completed</label>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Add Task</button>
                    </form>

                    <h2 class="mb-3">Your Tasks</h2>
                    <ul id="taskList" class="list-group"></ul>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
